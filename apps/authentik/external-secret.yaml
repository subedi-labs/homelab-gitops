# Pulls secrets from your ESO backend and creates two Kubernetes secrets:
#   1. authentik-secret-key  — the Django SECRET_KEY authentik uses to sign tokens
#   2. authentik-db-credentials — passed to both CNPG and the Helm chart
#
# Adjust secretStoreRef.name/kind to match your ClusterSecretStore or SecretStore.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secret-key
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: my-secret-store   # <-- your SecretStore/ClusterSecretStore name
    kind: ClusterSecretStore
  target:
    name: authentik-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: authentik/secret-key   # path in your secrets backend
        property: value
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-db-credentials
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: my-secret-store
    kind: ClusterSecretStore
  target:
    name: authentik-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: authentik/db
        property: username
    - secretKey: password
      remoteRef:
        key: authentik/db
        property: password