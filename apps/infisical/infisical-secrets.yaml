# NOTE: This secret cannot be ESO-managed — it contains the bootstrap credentials
# Infisical needs to start. Pulling from Infisical via ESO would be circular.
#
# Create this manually BEFORE syncing the ArgoCD Application:
#
kubectl create secret generic infisical-secrets \
  --namespace infisical \
  --from-literal=AUTH_SECRET=$(openssl rand -hex 32) \
  --from-literal=ENCRYPTION_KEY=$(openssl rand -hex 16)
#
# IMPORTANT: Save these values somewhere safe (e.g. a password manager).
# Losing them means losing access to all secrets stored in Infisical.
