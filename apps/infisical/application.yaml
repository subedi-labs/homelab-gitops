apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-standalone
    targetRevision: "0.161.3"  # verify with: helm search repo infisical/infisical-standalone
    helm:
      releaseName: infisical
      values: |
        infisical:
          enabled: true
          replicaCount: 1
          autoDatabaseSchemaMigration: true
          kubeSecretRef: infisical-secrets
        postgresql:
          enabled: false
        redis:
          enabled: true
        ingress:
          enabled: false
        ingress-nginx:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true