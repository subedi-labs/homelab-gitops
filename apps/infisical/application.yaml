apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
spec:
  destination:
    namespace: infisical
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: infisical-standalone
      repoURL: "https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/"
      targetRevision: 1.9.0
      helm:
        valueFiles:
          - $values/k8s/infisical/values.yaml
    - repoURL: "https://github.com/subedi-labs/homelab.git"
      targetRevision: HEAD
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
