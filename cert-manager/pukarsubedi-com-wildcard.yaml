apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pukarsubedi-com-wildcard
  namespace: gateway-system
spec:
  secretName: pukarsubedi-com-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.pukarsubedi.com"
  dnsNames:
    - "pukarsubedi.com"
    - "*.pukarsubedi.com"
