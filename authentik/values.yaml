postgresql:
  enabled: false  # using CNPG instead of the bundled chart Postgres

authentik:
  postgresql:
    host: "authentik-db-rw.authentik.svc.cluster.local"
    name: "authentik"
    user: "authentik"
    port: 5432
    # password left blank — supplied via env var below from the CNPG secret
  listen:
    trusted_proxy_cidrs:
      - 10.0.0.0/24

global:
  env:
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-db-creds
          key: password
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret-key
          key: secret_key

server:
  ingress:
    enabled: false  # exposing via Gateway API HTTPRoute, not chart ingress
