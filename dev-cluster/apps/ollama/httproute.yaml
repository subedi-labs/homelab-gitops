apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama
  namespace: ollama
spec:
  hostnames:
    - ollama.pukarsubedi.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: gateway-system
      sectionName: https
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: ollama
          namespace: ollama
          port: 11434
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
