---
# ============================================================
# HTTPRoute — ollama.pukarsubedi.com
# Attaches to the existing Cilium Gateway in gateway-system.
# Traffic flow:
#   Browser → Cloudflare Tunnel → Cilium Gateway (10.0.0.246)
#             → ollama.pukarsubedi.com → this route → ollama svc:11434
#
# VERIFY: Replace 'cilium-gateway' with your actual Gateway name.
#         Run: kubectl get gateway -n gateway-system
# ============================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama
  namespace: ollama
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https # <-- remove if your Gateway doesn't use named listeners

  hostnames:
    - ollama.pukarsubedi.com

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ollama # Service name created by the Helm chart (release name)
          namespace: ollama
          port: 11434
