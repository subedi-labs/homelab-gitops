apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homebrain-ui
  namespace: homebrain
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - homebrain.pukarsubedi.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homebrain-ui
          port: 80
