apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: 1.19.4
      helm:
        releaseName: cilium
        valueFiles:
          - $values/dev-cluster/infrastructure/cilium/values.yaml
    - repoURL: https://github.com/subedi-labs/homelab-docs
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  # No automated sync — manual only. Cilium is CNI; accidental agent restart = network outage.
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Hubble mTLS certs — Cilium manages these internally.
    # Helm re-generates on every render; ArgoCD must never overwrite.
    - group: ""
      kind: Secret
      name: cilium-ca
      namespace: kube-system
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-relay-client-certs
      namespace: kube-system
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-server-certs
      namespace: kube-system
      jsonPointers:
        - /data
    - group: apps
      kind: DaemonSet
      name: cilium
      namespace: kube-system
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: ""
      kind: ConfigMap
      name: cilium-config
      namespace: kube-system
      jqPathExpressions:
        - .data["node-ips"]
        - .data["ipam-multi-pool-pre-allocation"]
    - group: apps
      kind: Deployment
      name: cilium-operator
      namespace: kube-system
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: apps
      kind: Deployment
      name: hubble-relay
      namespace: kube-system
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: apps
      kind: Deployment
      name: hubble-ui
      namespace: kube-system
      jsonPointers:
        - /spec/template/metadata/annotations