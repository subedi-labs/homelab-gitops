# charts/kube-prometheus-stack/values.yaml
# kube-prometheus-stack 87.1.0
# Stack: k3s · Cilium (no kube-proxy) · Longhorn · Authentik · Gateway API

# ── Grafana ────────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  defaultDashboardsEnabled: true

  # Authentik OIDC — populate grafana-oidc-secret via ESO/Infisical with keys:
  #   GF_AUTH_GENERIC_OAUTH_CLIENT_ID
  #   GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
  envFromSecret: grafana-oidc-secret

  grafana.ini:
    server:
      root_url: https://grafana.pukarsubedi.com
    auth.generic_oauth:
      enabled: true
      name: Authentik
      icon: signin
      scopes: openid profile email
      auth_url: https://authentik.pukarsubedi.com/application/o/authorize/
      token_url: https://authentik.pukarsubedi.com/application/o/token/
      api_url: https://authentik.pukarsubedi.com/application/o/userinfo/
      role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
      allow_sign_up: true

  # Disable built-in ingress — using Gateway API HTTPRoute instead
  ingress:
    enabled: false

  # Grafana doesn't need a PV (dashboards via ConfigMaps, state is ephemeral)
  persistence:
    enabled: false

  # Sidecar discovers dashboards from ConfigMaps labelled grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true

# ── Prometheus ─────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "10GiB"

    # Longhorn-backed PVC for Prometheus TSDB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Discover ServiceMonitors/PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

  ingress:
    enabled: false

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  ingress:
    enabled: false

# ── k3s / Cilium adjustments ──────────────────────────────────────────────────

# Cilium replaces kube-proxy — disable scraping it
kubeProxy:
  enabled: false

# k3s embeds etcd but doesn't expose it on the default port with client certs
# accessible by Prometheus without extra config. Disable until you wire the
# etcd-client-cert secret (see README for how to enable).
kubeEtcd:
  enabled: false

# k3s binds scheduler and controller-manager to 127.0.0.1 by default.
# These will fail to scrape unless you patch the k3s systemd unit to bind
# to 0.0.0.0. Disable until then.
kubeScheduler:
  enabled: false

kubeControllerManager:
  enabled: false

# kube-state-metrics and node-exporter are fine as-is
kube-state-metrics:
  enabled: true

nodeExporter:
  enabled: true

prometheusOperator:
  enabled: true
  # Admission webhook is enabled by default — ignoreDifferences in the
  # Application manifest handles caBundle drift
  admissionWebhooks:
    enabled: true
